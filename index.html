<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>
    <h1>
        Rock Paper Scissors
    </h1>

    <button onclick=" playGame('Rock');
    " class="Rock">                                  
        <img src="Images/rock-emoji.png">
    </button>

    <button onclick=" playGame('Paper');" class="paper">
        <img src="Images/paper-emoji.png">
    </button>
    
    <button onclick=" 
        playGame('Scissors'); " class="scissors">
        <img src="Images/scissors-emoji.png">
    </button>

    <p class="js-result result"></p> 
    <p class="js-moves Moves">
    </p>
    <p class="js-score Score"></p>


    <button onclick="
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;
        localStorage.removeItem('score');
        updateScoreElement();" class="Reset-button">
        Reset Score
    </button>

    <script src="index.js"></script>

</body>
</html>
